<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word2Vec: Full Lifecycle Visualizer</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --node-input: #58a6ff;
            --node-hidden: #bc8cff;
            --node-target: #3fb950;
            --loss-color: #ff7b72;
            --vector-1: #bc8cff;
            --vector-2: #ff7b72;
            --line-idle: #30363d;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--panel-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            width: 1000px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .header h1 { margin: 0; font-size: 1.5rem; color: #fff; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        button {
            background-color: #21262d;
            color: var(--text-main);
            border: 1px solid #30363d;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.active {
            background-color: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }

        button:hover:not(.active) { background-color: #30363d; }

        .info-box {
            background: #0d1117;
            border-left: 4px solid var(--node-hidden);
            padding: 1rem 1.5rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            min-height: 60px;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        svg {
            width: 100%;
            height: 520px;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        /* SVG Element Styles */
        .node circle { fill: var(--panel-bg); stroke-width: 3px; transition: all 0.5s ease; }
        .node text { fill: var(--text-main); font-size: 13px; font-weight: 500; dominant-baseline: middle; }
        
        .node-input circle { stroke: var(--node-input); }
        .node-hidden circle { stroke: var(--node-hidden); }
        .node-target circle { stroke: var(--node-target); }
        .node-noise circle { stroke: #30363d; }
        
        .link { stroke: var(--line-idle); stroke-width: 1.5px; fill: none; transition: opacity 0.5s; }
        .label { fill: var(--text-muted); font-size: 12px; text-anchor: middle; letter-spacing: 1px; font-weight: bold; }
        .math-label { fill: #8b949e; font-size: 11px; font-family: monospace; }
        .super-label { fill: var(--node-target); font-size: 12px; font-weight: bold; }
        .noise-label { fill: #484f58; font-size: 11px; }

        /* Step 1 Animation */
        .step-1 .link-flow-active {
            stroke: var(--node-target);
            stroke-width: 2.5px;
            stroke-dasharray: 8;
            animation: flowAnim 0.8s linear infinite;
        }
        
        .step-1 .link-flow-hidden {
            stroke: var(--node-hidden);
            stroke-width: 2px;
            stroke-dasharray: 6;
            animation: flowAnim 1s linear infinite;
        }

        .step-1 .backprop-flow {
            stroke: var(--loss-color);
            stroke-width: 2px;
            stroke-dasharray: 5;
            animation: flowAnimBack 1.5s linear infinite;
            opacity: 0.8;
        }

        .step-1 .node-input circle { fill: rgba(88, 166, 255, 0.2); }
        .step-1 .node-hidden circle { fill: rgba(188, 140, 255, 0.2); }
        .step-1 .node-target circle { fill: rgba(63, 185, 80, 0.2); }

        @keyframes flowAnim {
            from { stroke-dashoffset: 16; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes flowAnimBack {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: 20; }
        }

        /* Step 2 Animation */
        .fade-out { opacity: 0.1 !important; }
        .box-highlight { fill: rgba(188, 140, 255, 0.1); stroke: var(--node-hidden); stroke-width: 2px; stroke-dasharray: 6; }
        .vector-text { fill: var(--node-hidden); font-family: monospace; font-size: 16px; font-weight: bold; text-anchor: middle; }

        /* Step 3 Animation */
        .axis { stroke: #30363d; stroke-width: 2px; }
        .vector-line { stroke-width: 4px; stroke-linecap: round; }
        .vec1 { stroke: var(--vector-1); }
        .vec2 { stroke: var(--vector-2); }
        .arc { fill: rgba(255, 255, 255, 0.1); stroke: #8b949e; stroke-width: 2px; stroke-dasharray: 4; }
        .math-text { fill: #fff; font-size: 15px; font-family: monospace; }
        
        /* View Toggling */
        .hidden-view { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Word Embedding Architecture</h1>
        </div>

        <div class="controls">
            <button id="btn1" class="active" onclick="setStep(1)">1. Training (Loss Optimization)</button>
            <button id="btn2" onclick="setStep(2)">2. Extract Word Vector</button>
            <button id="btn3" onclick="setStep(3)">3. Cosine Distance</button>
        </div>

        <div class="info-box" id="infoText">
            </div>

        <svg id="svgCanvas">
            <g id="networkView">
                <text x="120" y="470" class="label">INPUT LAYER</text>
                <text x="380" y="470" class="label">HIDDEN LAYER (100D)</text>
                <text x="650" y="470" class="label">OUTPUT LAYER</text>

                <rect id="extractionBox" x="310" y="30" width="140" height="400" rx="10" class="box-highlight hidden-view"></rect>
                <text id="extractionText" x="380" y="450" class="vector-text hidden-view">Word Vector [0.12, -0.4...]</text>

                <g id="linksGroup"></g>
                <g id="nodesGroup"></g>

                <g id="mathGroup" class="hidden-view">
                    <rect x="780" y="160" width="190" height="120" fill="#21262d" stroke="var(--loss-color)" stroke-width="2" rx="8" />
                    <text x="875" y="185" fill="var(--loss-color)" font-weight="bold" font-size="14" text-anchor="middle">Loss Function</text>
                    <text x="875" y="210" fill="#c9d1d9" font-size="12" text-anchor="middle">Compare Output (ŷ)</text>
                    <text x="875" y="225" fill="#c9d1d9" font-size="12" text-anchor="middle">with True Label (y)</text>
                    <text x="875" y="250" fill="var(--loss-color)" font-family="monospace" font-size="11" text-anchor="middle">L = -Σ y log(ŷ)</text>
                    <text x="875" y="265" fill="#8b949e" font-size="10" text-anchor="middle">(Cross-Entropy)</text>

                    <path d="M 780 200 Q 550 500 380 430" fill="none" class="backprop-flow" />
                    <path d="M 380 430 Q 250 350 120 250" fill="none" class="backprop-flow" />
                    <text x="500" y="450" fill="var(--loss-color)" font-size="12" font-weight="bold" class="fade-out" style="opacity: 0.8;">Optimize Weights (Backpropagation)</text>
                </g>
            </g>

            <g id="cosineView" class="hidden-view">
                <line x1="150" y1="400" x2="800" y2="400" class="axis" />
                <line x1="150" y1="400" x2="150" y2="50" class="axis" />
                
                <path d="M 350 400 A 200 200 0 0 0 325 240" class="arc" fill="none"/>
                <text x="400" y="340" fill="#8b949e" font-size="16px">θ (Angle)</text>

                <line x1="150" y1="400" x2="650" y2="200" class="vector-line vec1" />
                <circle cx="650" cy="200" r="6" fill="var(--vector-1)" />
                <text x="665" y="195" fill="var(--vector-1)" font-size="16px" font-weight="bold">"sicherheit"</text>

                <line x1="150" y1="400" x2="550" y2="150" class="vector-line vec2" />
                <circle cx="550" cy="150" r="6" fill="var(--vector-2)" />
                <text x="565" y="145" fill="var(--vector-2)" font-size="16px" font-weight="bold">"kriminalität"</text>

                <rect x="550" y="300" width="300" height="90" fill="#161b22" stroke="#30363d" rx="8" />
                <text x="570" y="330" class="math-text">Cosine Similarity = cos(θ)</text>
                <text x="570" y="355" class="math-text">Small θ  => High Similarity</text>
                <text x="570" y="380" class="math-text">Cosine Distance = 1 - cos(θ)</text>
            </g>
        </svg>
    </div>

    <script>
        const linksGroup = document.getElementById('linksGroup');
        const nodesGroup = document.getElementById('nodesGroup');
        const networkView = document.getElementById('networkView');
        const cosineView = document.getElementById('cosineView');
        const extractionBox = document.getElementById('extractionBox');
        const extractionText = document.getElementById('extractionText');
        const infoText = document.getElementById('infoText');
        const mathGroup = document.getElementById('mathGroup');

        // Setup Window=5 Target Words
        const targets = [
            { label: 'müssen', y: 40, isTarget: true },
            { label: 'die', y: 80, isTarget: true },
            { label: 'innere', y: 120, isTarget: true },
            { label: 'und', y: 160, isTarget: true },
            { label: 'äußere', y: 200, isTarget: true },
            { label: 'unseres', y: 240, isTarget: true },
            { label: 'landes', y: 280, isTarget: true },
            { label: 'weiter', y: 320, isTarget: true },
            { label: 'stärken', y: 360, isTarget: true },
            { label: 'und', y: 400, isTarget: true }
        ];

        // Draw Input
        createNode('in', 'input', 120, 220, 'sicherheit', 30);

        // Draw Hidden Layer
        for(let i=0; i<5; i++) {
            let yPos = 80 + (i * 70);
            let label = (i === 2) ? '...' : `Dim ${i+1}`;
            if(i===4) label = 'Dim 100';
            createNode(`h${i}`, 'hidden', 380, yPos, label, 15, false, true); // true = show dot product
        }

        // Draw Output Nodes
        targets.forEach((t, i) => {
            const type = t.isTarget ? 'target' : 'noise';
            createNode(`out${i}`, type, 650, t.y, t.label, 12, true, true, t.isTarget);
        });

        // Draw Connections
        const hiddenNodes = document.querySelectorAll('.node-hidden');
        const outNodes = document.querySelectorAll('.node-target, .node-noise');

        hiddenNodes.forEach(hn => {
            // Input to Hidden
            createLink(120, 220, 380, hn.getAttribute('cy'), 'link-in');
            
            // Hidden to Output
            outNodes.forEach(on => {
                const isTarget = on.classList.contains('node-target');
                createLink(380, hn.getAttribute('cy'), 650, on.getAttribute('cy'), isTarget ? 'link-target-out' : 'link-noise');
            });
        });

        function createNode(id, type, x, y, labelText, r, textRight=false, showMath=false, isSupervisedTarget=false) {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', `node node-${type}`);
            g.setAttribute('id', `node-${id}`);
            
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', r);
            
            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.textContent = labelText;
            
            if(textRight) {
                text.setAttribute('x', x + 25); text.setAttribute('y', y);
                text.setAttribute('text-anchor', 'start');
            } else if (type === 'hidden') {
                text.setAttribute('x', x); text.setAttribute('y', y - 25);
                text.setAttribute('text-anchor', 'middle');
            } else {
                text.setAttribute('x', x); text.setAttribute('y', y + 45);
                text.setAttribute('text-anchor', 'middle');
            }

            g.appendChild(circle); g.appendChild(text);

            // Append Mathematical Operations
            if (showMath) {
                const mathText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                mathText.setAttribute('class', 'math-element hidden-view math-label');
                if (type === 'hidden') {
                    mathText.textContent = 'h = Σ(w·x)';
                    mathText.setAttribute('x', x); mathText.setAttribute('y', y + 25);
                    mathText.setAttribute('text-anchor', 'middle');
                } else if (type === 'target') {
                    mathText.textContent = 'ŷ = σ(Σ(w·h))';
                    mathText.setAttribute('x', x - 95); mathText.setAttribute('y', y);
                }
                g.appendChild(mathText);
            }

            // Append Supervised Labels
            if (type === 'target' || type === 'noise') {
                const labelTextObj = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                labelTextObj.setAttribute('class', `math-element hidden-view ${isSupervisedTarget ? 'super-label' : 'noise-label'}`);
                labelTextObj.textContent = isSupervisedTarget ? '[y=1]' : '[y=0]';
                labelTextObj.setAttribute('x', x + 95); labelTextObj.setAttribute('y', y);
                g.appendChild(labelTextObj);
            }

            nodesGroup.appendChild(g);
        }

        function createLink(x1, y1, x2, y2, cls) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1);
            line.setAttribute('x2', x2); line.setAttribute('y2', y2);
            line.setAttribute('class', `link ${cls}`);
            linksGroup.appendChild(line);
        }

        // Logic for Switching Steps
        function setStep(step) {
            // Reset Buttons
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${step}`).classList.add('active');

            // Reset SVG Canvas State
            networkView.classList.remove('hidden-view', 'step-1');
            cosineView.classList.add('hidden-view');
            extractionBox.classList.add('hidden-view');
            extractionText.classList.add('hidden-view');
            mathGroup.classList.add('hidden-view');
            
            document.querySelectorAll('.node-input, .node-target, .link-in, .link-target-out, .link-noise, .label').forEach(el => {
                el.classList.remove('fade-out');
            });
            document.querySelectorAll('.math-element').forEach(el => el.classList.add('hidden-view'));

            if (step === 1) {
                networkView.classList.add('step-1');
                mathGroup.classList.remove('hidden-view');
                document.querySelectorAll('.math-element').forEach(el => el.classList.remove('hidden-view'));
                
                document.querySelectorAll('.link-in').forEach(l => l.classList.add('link-flow-hidden'));
                document.querySelectorAll('.link-target-out').forEach(l => l.classList.add('link-flow-active'));
                
                infoText.innerHTML = `<strong>1. Training Phase:</strong> The network calculates the scalar product of inputs and weights <code>Σ(w·x)</code>. It compares its output prediction (<code>ŷ</code>) against the true labels from the text (<code>y=1</code> for context words). The Loss Function calculates the error and updates the weights via backpropagation.`;
            } 
            
            else if (step === 2) {
                document.querySelectorAll('.link-in, .link-target-out').forEach(l => {
                    l.classList.remove('link-flow-active');
                    l.classList.remove('link-flow-hidden');
                });
                document.querySelectorAll('.node-input, .node-target, .node-noise, .link-in, .link-target-out, .link-noise').forEach(el => el.classList.add('fade-out'));
                
                extractionBox.classList.remove('hidden-view');
                extractionText.classList.remove('hidden-view');
                infoText.innerHTML = `<strong>2. Extraction:</strong> Once training is finished, we discard the output layer. The 100 learned weights in the hidden layer become the permanent mathematical coordinate (the <strong>Word Vector</strong>) for the word "sicherheit".`;
            } 
            
            else if (step === 3) {
                networkView.classList.add('hidden-view');
                cosineView.classList.remove('hidden-view');
                infoText.innerHTML = `<strong>3. Inference (Cosine Distance):</strong> We compare the extracted vectors. Words that shared similar context windows during training (like "sicherheit" and "kriminalität") will point in the same direction, resulting in a small angle (θ) and a low Cosine Distance.`;
            }
        }

        // Initialize Step 1
        setStep(1);

    </script>
</body>
</html>
